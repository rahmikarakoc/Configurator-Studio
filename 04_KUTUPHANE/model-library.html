<meta charset="utf-8">
<title>Model Kütüphanesi — Configurator Studio</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<style>
  :root{
    --bg-grad: radial-gradient(120% 100% at 26% -8%, #223056 0%, #0b0f18 58%);
    --panel: rgba(19,27,40,.66); --panel2: rgba(255,255,255,.055); --panel-solid:#161d2b;
    --ink:#F2F5F9; --dim:rgba(242,245,249,.56);
    --line:rgba(255,255,255,.10); --line2:rgba(255,255,255,.17);
    --accent:#7C5CFC; --accent2:#9C7CFF;
    --pink:#F0568F; --blue:#3B8BF5; --orange:#F5A623; --green:#33E08A; --purple:#8B5CF6;
    --err:#FF5C7A; --ok:#33E08A;
    --blur: blur(22px) saturate(170%);
    --r-lg:22px; --r-md:14px; --r-sm:9px; --r-pill:999px;
    --shadow-float: 0 18px 44px -18px rgba(0,0,0,.55);
    --font-ui:-apple-system,"Segoe UI",system-ui,sans-serif;
    --font-mono:"SF Mono","Consolas","Courier New",monospace;
  }
  :root[data-theme="light"]{
    --bg-grad: radial-gradient(120% 100% at 26% -8%, #EAF3F5 0%, #E6E8F7 55%, #EEF0FB 100%);
    --panel: rgba(255,255,255,.70); --panel2: rgba(20,30,50,.045); --panel-solid:#ffffff;
    --ink:#141A24; --dim:rgba(20,26,36,.58);
    --line:rgba(20,30,50,.09); --line2:rgba(20,30,50,.15);
    --accent:#6A45E8; --accent2:#8563F2;
    --pink:#E14E86; --blue:#2F76E0; --orange:#DE8A0C; --green:#149E63; --purple:#7C4CE0;
    --err:#E14367; --ok:#149E63;
    --shadow-float: 0 18px 40px -18px rgba(30,40,70,.22);
  }
  :root[data-theme="warm"]{
    --bg-grad: #F4EFE2;
    --panel:#FFFFFF; --panel2:#ECE6D5; --panel-solid:#FFFFFF;
    --ink:#17140F; --dim:#726C5C;
    --line:#DED5BB; --line2:#17140F;
    --accent:#2F6DF0; --accent2:#5089F5;
    --pink:#F3AD8C; --blue:#2F6DF0; --orange:#F0C13E; --green:#3E9B6B; --purple:#8A6CD6;
    --err:#E0523F; --ok:#3E9B6B;
    --blur: none;
    --shadow-float: 0 10px 24px -14px rgba(23,20,15,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--font-ui);color:var(--ink);background:var(--bg-grad);font-size:13.5px;-webkit-font-smoothing:antialiased}
  button,input,select,textarea{font-family:inherit}
  .app{display:grid;grid-template-rows:60px 1fr;height:100vh}
  .topbar{display:flex;align-items:center;gap:14px;padding:0 18px;border-bottom:1px solid var(--line);background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);z-index:5;box-shadow:var(--shadow-float)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:13.5px}
  .brand .mark{width:26px;height:26px;flex:0 0 auto;display:block;filter:drop-shadow(0 3px 6px rgba(30,15,80,.28))}
  .brand .mark svg{width:100%;height:100%;display:block}
  .nav{display:flex;gap:2px;margin-left:8px;background:var(--panel2);padding:3px;border-radius:var(--r-pill);border:1px solid var(--line)}
  .nav a{font-size:11.5px;font-weight:700;color:var(--dim);text-decoration:none;padding:7px 13px;border-radius:var(--r-pill);transition:.15s}
  .nav a:hover{color:var(--ink)}
  .nav a.on{background:linear-gradient(135deg, var(--accent2), var(--accent));color:#fff;box-shadow:0 4px 14px -4px var(--accent)}
  .spacer{flex:1}
  .btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:8px 15px;border-radius:var(--r-pill);border:1px solid var(--line2);background:var(--panel2);color:var(--ink);cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:linear-gradient(135deg, var(--accent2), var(--accent));border-color:transparent;color:#fff;box-shadow:0 6px 18px -6px var(--accent)}
  .btn.danger{border-color:var(--err);color:var(--err)}
  .btn.sm{padding:6px 12px;font-size:11px}
  .icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid transparent;background:transparent;color:var(--dim);display:grid;place-items:center;cursor:pointer;transition:.12s}
  .icon-btn:hover{background:var(--panel2);color:var(--ink)}
  .icon-btn.on{background:linear-gradient(135deg, var(--accent2), var(--accent));color:#fff}
  .icon-btn svg{width:15px;height:15px}
  .theme-toggle{width:34px;height:34px;border-radius:50%;border:1px solid var(--line2);background:var(--panel2);color:var(--dim);display:grid;place-items:center;cursor:pointer;transition:.15s;flex:0 0 auto}
  .theme-toggle:hover{color:var(--ink);border-color:var(--accent)}
  .theme-toggle svg{width:16px;height:16px}

  .body{display:grid;grid-template-columns:250px 1fr;min-height:0;overflow:hidden;gap:12px;padding:12px}
  .sidebar{border:1px solid var(--line);border-radius:var(--r-lg);background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);overflow-y:auto;padding:16px;box-shadow:var(--shadow-float)}
  .sidebar h3{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);margin:16px 0 8px;font-weight:800}
  .sidebar h3:first-child{margin-top:0}
  .sidebar input[type=text],.sidebar select{width:100%;padding:8px 10px;border-radius:var(--r-md);border:1px solid var(--line2);background:var(--panel2);color:var(--ink);font-size:12px}
  .checkrow{display:flex;align-items:center;gap:7px;font-size:12px;margin-top:8px;cursor:pointer}

  .main{overflow-y:auto;padding:4px 8px 20px}
  .main-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .main-head h1{font-size:16px;margin:0;font-weight:800}
  .count{font-size:11.5px;color:var(--dim)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
  .card{border:1px solid var(--line);border-radius:var(--r-md);background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);overflow:hidden;cursor:pointer;transition:.15s;position:relative;box-shadow:var(--shadow-float)}
  .card:hover{border-color:var(--accent);transform:translateY(-3px)}
  .card .thumb{height:130px;background-size:cover;background-position:center;background-color:var(--panel2);position:relative;display:flex;align-items:center;justify-content:center;color:var(--dim)}
  .card .fav{position:absolute;top:8px;right:8px;width:27px;height:27px;border-radius:50%;background:rgba(10,14,22,.5);backdrop-filter:blur(6px);color:#fff;border:none;display:grid;place-items:center;cursor:pointer;font-size:13px}
  .card .fav.on{color:#ffcf4d}
  .card .send{position:absolute;top:8px;left:8px;width:27px;height:27px;border-radius:50%;background:rgba(10,14,22,.5);backdrop-filter:blur(6px);color:#fff;border:none;display:grid;place-items:center;cursor:pointer;font-size:13px;opacity:0;transition:opacity .12s}
  .card:hover .send{opacity:1}
  .card .badge{position:absolute;left:8px;bottom:8px;font-size:9px;font-weight:800;padding:3px 7px;border-radius:var(--r-pill);background:rgba(10,14,22,.55);backdrop-filter:blur(6px);color:#fff}
  .card .info{padding:11px 12px}
  .card .n{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .m{font-size:10.5px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .empty{padding:60px 20px;text-align:center;color:var(--dim)}
  .empty b{display:block;font-size:14px;color:var(--ink);margin-bottom:6px}

  .modal-bg{position:fixed;inset:0;background:rgba(6,9,16,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:var(--panel-solid);border:1px solid var(--line);border-radius:var(--r-lg);width:min(820px,100%);max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px -20px rgba(0,0,0,.6)}
  .modal.viewer{width:min(980px,100%)}
  .modal-head{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel-solid);z-index:2}
  .modal-head h2{font-size:14px;margin:0;flex:1;font-weight:800}
  .modal-body{padding:18px}
  .modal-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--line2);background:var(--panel2);color:var(--ink);cursor:pointer;font-size:14px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-grid.full{grid-template-columns:1fr}
  .f{display:flex;flex-direction:column;gap:4px}
  .f label{font-size:10.5px;color:var(--dim);font-weight:700}
  .f input,.f select,.f textarea{padding:9px 10px;border-radius:var(--r-md);border:1px solid var(--line2);background:var(--panel2);color:var(--ink);font-size:12.5px}
  .f textarea{resize:vertical;min-height:56px}
  .modal-actions{display:flex;gap:8px;padding:14px 18px;border-top:1px solid var(--line);position:sticky;bottom:0;background:var(--panel-solid)}
  .drop{border:1.5px dashed var(--line2);border-radius:var(--r-md);padding:22px 12px;text-align:center;cursor:pointer;margin-bottom:14px}
  .drop:hover,.drop.over{border-color:var(--accent);background:color-mix(in srgb, var(--accent) 8%, transparent)}
  .drop b{display:block;font-size:12.5px}
  .drop span{display:block;font-size:10.5px;color:var(--dim);margin-top:3px}

  .viewer-stage{position:relative;height:420px;background:var(--panel2);border-radius:var(--r-md);overflow:hidden;border:1px solid var(--line)}
  .viewer-stage canvas{display:block;width:100%;height:100%}
  .viewer-toolbar{position:absolute;top:10px;left:10px;display:flex;gap:2px;background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line);border-radius:var(--r-pill);padding:4px}
  .viewer-hud{position:absolute;left:10px;bottom:10px;font-family:var(--font-mono);font-size:10.5px;color:var(--ink);background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line);padding:5px 10px;border-radius:var(--r-pill)}
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px}
  .stat .l{font-size:9.5px;color:var(--dim);text-transform:uppercase;font-weight:700}
  .stat .v{font-size:13px;font-weight:700;font-family:var(--font-mono);margin-top:2px}

  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(10px);background:var(--panel-solid);color:var(--ink);border:1px solid var(--line2);font-size:12.5px;font-weight:600;padding:11px 18px;border-radius:var(--r-pill);opacity:0;transition:.25s;pointer-events:none;z-index:99;box-shadow:var(--shadow-float)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--err);border-color:var(--err);color:#fff}
  input[type=file]{display:none}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}

  [data-theme="warm"] .topbar,
  [data-theme="warm"] .sidebar,
  [data-theme="warm"] .card,
  [data-theme="warm"] .modal,
  [data-theme="warm"] .viewer-stage,
  [data-theme="warm"] .viewer-toolbar,
  [data-theme="warm"] .viewer-hud,
  [data-theme="warm"] .toast{ border-width:1.5px; border-color:var(--line2) }
  [data-theme="warm"] .btn.primary,
  [data-theme="warm"] .nav a.on,
  [data-theme="warm"] .icon-btn.on{ background:var(--ink); color:#fff; box-shadow:none }
  [data-theme="warm"] .brand{ font-weight:900; letter-spacing:-.3px }
  [data-theme="warm"] .main-head h1{ font-weight:900 }
</style>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { dbGetAll, dbPut, dbDelete, newId, blankModel } from './js/db.js';
import { enforceAccessGate } from '../assets/access-gate.js';

await enforceAccessGate();

const $ = s => document.querySelector(s);
function toast(msg, isErr){
  const t = $("#toast"); t.textContent = msg; t.className = "toast show" + (isErr?" err":"");
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 3000);
}

/* ---- Editöre gönder — localStorage üzerinden "beklemede" işareti bırakıp yönlendirir. ---- */
function sendToEditor(type, id){
  localStorage.setItem("cs_pending_import", JSON.stringify({ type, id }));
  window.location.href = "../03_ARAC/model-material-editor.html";
}

/* ---- Tema geçişi (koyu/açık/sıcak) — editördeki seçimle aynı localStorage anahtarını paylaşır ---- */
const THEME_ORDER = ["dark", "light", "warm"];
function applyThemeIcon(theme){
  $("#themeIconSun").style.display = theme === "light" ? "" : "none";
  $("#themeIconMoon").style.display = theme === "dark" ? "" : "none";
  $("#themeIconWarm").style.display = theme === "warm" ? "" : "none";
}
(function initTheme(){
  const saved = localStorage.getItem("cs_theme") || "dark";
  document.documentElement.dataset.theme = saved;
  applyThemeIcon(saved);
})();
$("#themeToggle").addEventListener("click", ()=>{
  const cur = document.documentElement.dataset.theme || "dark";
  const next = THEME_ORDER[(THEME_ORDER.indexOf(cur) + 1) % THEME_ORDER.length];
  document.documentElement.dataset.theme = next;
  localStorage.setItem("cs_theme", next);
  applyThemeIcon(next);
});

/* ================= liste / filtre / kart durumu ================= */
let models = [];
let objectUrls = [];
function revokeAllUrls(){ objectUrls.forEach(u=>URL.revokeObjectURL(u)); objectUrls = []; }
function urlFor(blob){ if(!blob) return null; const u = URL.createObjectURL(blob); objectUrls.push(u); return u; }

async function loadAll(){
  models = await dbGetAll("models");
  models.sort((a,b)=> (b.updatedAt||"").localeCompare(a.updatedAt||""));
  populateFilterOptions();
  render();
}
function populateFilterOptions(){
  const brands = [...new Set(models.map(m=>m.brand).filter(Boolean))].sort();
  const cats = [...new Set(models.map(m=>m.category).filter(Boolean))].sort();
  const formats = [...new Set(models.map(m=>m.format).filter(Boolean))].sort();
  const curBrand=$("#fBrand").value, curCat=$("#fCategory").value, curFmt=$("#fFormat").value;
  $("#fBrand").innerHTML = '<option value="">Tümü</option>' + brands.map(b=>`<option ${b===curBrand?'selected':''}>${b}</option>`).join("");
  $("#fCategory").innerHTML = '<option value="">Tümü</option>' + cats.map(c=>`<option ${c===curCat?'selected':''}>${c}</option>`).join("");
  $("#fFormat").innerHTML = '<option value="">Tümü</option>' + formats.map(f=>`<option ${f===curFmt?'selected':''}>${f}</option>`).join("");
}
function filtered(){
  const q = $("#fSearch").value.trim().toLowerCase();
  const brand=$("#fBrand").value, cat=$("#fCategory").value, fmt=$("#fFormat").value, favOnly=$("#fFav").checked;
  return models.filter(m=>{
    if(q && !(`${m.name} ${m.brand} ${m.code} ${(m.tags||[]).join(" ")}`.toLowerCase().includes(q))) return false;
    if(brand && m.brand!==brand) return false;
    if(cat && m.category!==cat) return false;
    if(fmt && m.format!==fmt) return false;
    if(favOnly && !m.favorite) return false;
    return true;
  });
}
function render(){
  revokeAllUrls();
  const list = filtered();
  $("#resultCount").textContent = list.length + " model";
  const el = $("#grid");
  if(!list.length){
    el.innerHTML = `<div class="empty" style="grid-column:1/-1"><b>Model bulunamadı</b>"+ Yeni Model" ile doğrudan buraya bir .glb/.gltf/.obj dosyası yükleyebilirsin.</div>`;
    return;
  }
  el.innerHTML = list.map(m=>`
    <div class="card" data-id="${m.id}" draggable="true" title="Editöre sürükleyip bırakabilir ya da → ile gönderebilirsin">
      <div class="thumb" style="${m.thumb ? `background-image:url(${urlFor(m.thumb)})` : ''}">
        ${m.thumb ? '' : '3D'}
        <button class="fav ${m.favorite?'on':''}" data-favbtn="${m.id}">★</button>

  el.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("click", e=>{
      if(e.target.closest("[data-favbtn],[data-sendbtn]")) return;
      openViewer(card.dataset.id);

      e.dataTransfer.setData("application/x-cs-item", JSON.stringify({ type:"model", id: card.dataset.id }));
      e.dataTransfer.effectAllowed = "copy";
    });
  });
  el.querySelectorAll("[data-sendbtn]").forEach(btn=>{
    btn.addEventListener("click", e=>{
      e.stopPropagation();
      sendToEditor("model", btn.dataset.sendbtn);
    });
  });
  el.querySelectorAll("[data-favbtn]").forEach(btn=>{

      await dbPut("models", m);

}

/* ================= dosya ayrıştırma (poly/vert sayımı + thumbnail) ================= */
const gltfLoader = new GLTFLoader();
const objLoader = new OBJLoader();

function parseModelFile(file){
  const ext = file.name.split(".").pop().toLowerCase();
  return new Promise((resolve, reject)=>{
    if(!["glb","gltf","obj"].includes(ext)){ reject(new Error("Desteklenmeyen format: ." + ext + " (bu tarayıcı görüntüleyicisi .glb/.gltf/.obj okuyabilir; diğer formatlar yalnızca meta veriyle kataloglanır)")); return; }
    const reader = new FileReader();
    reader.onerror = ()=> reject(new Error("Dosya okunamadı."));
    reader.onload = ()=>{
      try{
        if(ext==="obj"){
          const text = new TextDecoder().decode(reader.result);
          resolve({ object3D: objLoader.parse(text), ext });
        }else{
          gltfLoader.parse(reader.result, "", gltf=>resolve({ object3D: gltf.scene, ext }), err=>reject(err));
        }
      }catch(err){ reject(err); }
    };
    reader.readAsArrayBuffer(file);
  });
}

function countGeometry(object3D){
  let verts=0, tris=0;
  object3D.traverse(o=>{
    if(o.isMesh && o.geometry){
      const pos = o.geometry.attributes.position;
      if(pos) verts += pos.count;
      tris += o.geometry.index ? o.geometry.index.count/3 : (pos ? pos.count/3 : 0);
    }
  });
  return { verts: Math.round(verts), tris: Math.round(tris) };
}

/* Küçük, tek seferlik offscreen render ile kart küçük resmi üretir. */
async function renderThumbnail(object3D){
  const w=320,h=240;
  const canvas = document.createElement("canvas"); canvas.width=w; canvas.height=h;
  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true, preserveDrawingBuffer:true });
  renderer.setPixelRatio(1);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, w/h, 0.01, 100);
  const key = new THREE.DirectionalLight(0xffffff, 3); key.position.set(3,5,3); scene.add(key);
  scene.add(new THREE.HemisphereLight(0xffffff, 0x333333, 0.7));

  const box = new THREE.Box3().setFromObject(object3D);
  const size = box.getSize(new THREE.Vector3()), center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x,size.y,size.z, 0.0001);
  object3D.position.sub(center);
  scene.add(object3D);
  const dist = (maxDim/(2*Math.tan(THREE.MathUtils.degToRad(camera.fov)/2)))*1.8;
  camera.position.set(dist*0.7, dist*0.55, dist*0.7);
  camera.lookAt(0,0,0);
  renderer.render(scene, camera);
  const blob = await new Promise(res=> canvas.toBlob(res, "image/png"));
  renderer.dispose();
  return blob;
}

      ${fieldRow("Ölçüler (En×Boy×Derinlik)", `<div style="display:flex;gap:6px"><input type="number" data-f="w" value="${m.dimensions?.width??''}"><input type="number" data-f="h" value="${m.dimensions?.height??''}"><input type="number" data-f="d" value="${m.dimensions?.depth??''}"><select data-f="unit" style="flex:0 0 62px"><option ${m.dimensions?.unit==='mm'?'selected':''}>mm</option><option ${(!m.dimensions||m.dimensions.unit==='cm')?'selected':''}>cm</option><option ${m.dimensions?.unit==='m'?'selected':''}>m</option></select></div>`)}

      ${fieldRow("Para Birimi", `<input data-f="currency" value="${m.currency||'TRY'}">`)}
    </div>

    </div>
  `;
  $("#formActions").innerHTML = `<div style="flex:1"></div><button class="btn sm" id="formCancel">Vazgeç</button><button class="btn sm primary" id="formSave">Kaydet</button>`;
  $("#formModalBg").classList.add("show");
  $("#formClose").onclick = $("#formCancel").onclick = ()=> $("#formModalBg").classList.remove("show");

  if(isNew){
    const drop = $("#modelDrop"), input = $("#modelFileInput");
    drop.addEventListener("click", ()=>input.click());
    ["dragenter","dragover"].forEach(ev=>drop.addEventListener(ev, e=>{ e.preventDefault(); drop.classList.add("over"); }));
    ["dragleave","drop"].forEach(ev=>drop.addEventListener(ev, e=>{ e.preventDefault(); drop.classList.remove("over"); }));
    drop.addEventListener("drop", e=>{ const f=e.dataTransfer.files[0]; if(f) handlePickedFile(f, m); });
    input.addEventListener("change", e=>{ const f=e.target.files[0]; if(f) handlePickedFile(f, m); });
  }

  $("#formSave").onclick = async ()=>{
    const body = $("#formBody");
    const val = f => body.querySelector(`[data-f="${f}"]`)?.value;
    m.name = val("name"); m.brand = val("brand"); m.code = val("code");
    m.category = val("category"); m.subcategory = val("subcategory");

    m.dimensions = { width: val("w")?+val("w"):null, height: val("h")?+val("h"):null, depth: val("d")?+val("d"):null, unit: val("unit") };

    m.currency = val("currency");

    await dbPut("models", m);

    $("#formModalBg").classList.remove("show");

async function handlePickedFile(file, m){
  try{
    toast("Dosya işleniyor: " + file.name + " …");
    const { object3D, ext } = await parseModelFile(file);
    const { verts, tris } = countGeometry(object3D);
    m.fileBlob = file; m.fileName = file.name; m.format = ext.toUpperCase();
    m.vertCount = verts; m.polyCount = tris;
    m.thumb = await renderThumbnail(object3D);
    $("#modelDrop").querySelector("b").textContent = "✓ " + file.name;
    $("#modelDrop").querySelector("span").textContent = `${tris.toLocaleString()} üçgen · ${verts.toLocaleString()} vertex`;
    toast("Dosya hazır — bilgileri doldurup kaydedebilirsin.");
  }catch(err){
    toast("Dosya işlenemedi: " + err.message, true);
    console.error(err);
  }
}

/* ================= 3D detay görüntüleyici ================= */
let viewer = null; // { renderer, scene, camera, controls, object3D, mats }
function ensureViewer(){
  if(viewer) return viewer;
  const host = $("#viewerStage");
  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  host.insertBefore(renderer.domElement, host.firstChild);
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, 1, 0.01, 200);
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  const key = new THREE.DirectionalLight(0xffffff, 3); key.position.set(3,5,3); scene.add(key);
  scene.add(new THREE.HemisphereLight(0xffffff, 0x333333, 0.7));
  function resize(){
    const w = host.clientWidth, h = host.clientHeight;
    renderer.setSize(w,h,false); camera.aspect = w/h; camera.updateProjectionMatrix();
  }
  new ResizeObserver(resize).observe(host);
  resize();
  renderer.setAnimationLoop(()=>{ controls.update(); renderer.render(scene, camera); });
  viewer = { renderer, scene, camera, controls, object3D:null, mats:[], wireOn:false, matOn:true };
  return viewer;
}

let currentViewId = null;
async function openViewer(id){
  const m = models.find(x=>x.id===id);
  if(!m) return;
  currentViewId = id;
  $("#viewTitle").textContent = m.name || "Model";
  $("#statGrid").innerHTML = `
    <div class="stat"><div class="l">Format</div><div class="v">${m.format||'—'}</div></div>
    <div class="stat"><div class="l">Üçgen</div><div class="v">${(m.polyCount||0).toLocaleString()}</div></div>
    <div class="stat"><div class="l">Vertex</div><div class="v">${(m.vertCount||0).toLocaleString()}</div></div>
    <div class="stat"><div class="l">Ölçü</div><div class="v" style="font-size:11px">${m.dimensions?.width||'?'}×${m.dimensions?.height||'?'}×${m.dimensions?.depth||'?'} ${m.dimensions?.unit||''}</div></div>
  `;
  $("#viewMetaBody").innerHTML = `<div class="f"><label>Açıklama</label><div style="font-size:12px;color:var(--dim);line-height:1.6">${m.description || 'Açıklama girilmemiş.'}</div></div>`;
  const dl = $("#btnDownloadModel");
  if(m.fileBlob){ dl.href = urlFor(m.fileBlob); dl.download = m.fileName || (m.name+".glb"); dl.style.display=""; }
  else dl.style.display = "none";

  $("#viewModalBg").classList.add("show");
  const v = ensureViewer();
  v.wireOn=false; v.matOn=true; $("#vWire").classList.remove("on"); $("#vMat").classList.add("on");
  if(v.object3D){ v.scene.remove(v.object3D); v.object3D=null; }
  $("#viewerHud").textContent = "Yükleniyor…";

  if(!m.fileBlob){ $("#viewerHud").textContent = "Bu formatta önizleme desteklenmiyor (yalnızca meta veri kataloglandı)."; return; }
  try{
    const buf = await m.fileBlob.arrayBuffer();
    const ext = (m.format||"").toLowerCase();
    let object3D;
    if(ext==="obj") object3D = objLoader.parse(new TextDecoder().decode(buf));
    else object3D = await new Promise((res,rej)=> gltfLoader.parse(buf, "", g=>res(g.scene), rej));

    v.mats = [];
    object3D.traverse(o=>{ if(o.isMesh){ o.castShadow=o.receiveShadow=true; (Array.isArray(o.material)?o.material:[o.material]).forEach(mm=>mm&&v.mats.push(mm)); } });

    const box = new THREE.Box3().setFromObject(object3D);
    const size = box.getSize(new THREE.Vector3()), center = box.getCenter(new THREE.Vector3());
    object3D.position.sub(center);
    v.scene.add(object3D);
    v.object3D = object3D;
    const maxDim = Math.max(size.x,size.y,size.z,0.0001);
    const dist = (maxDim/(2*Math.tan(THREE.MathUtils.degToRad(v.camera.fov)/2)))*1.8;
    v.camera.position.set(dist*0.7, dist*0.55, dist*0.7);
    v.controls.target.set(0,0,0);
    v.controls.update();
    $("#viewerHud").textContent = `${(m.polyCount||0).toLocaleString()} üçgen`;
  }catch(err){
    $("#viewerHud").textContent = "Yükleme hatası.";
    console.error(err);
  }
}
$("#viewClose").addEventListener("click", ()=> $("#viewModalBg").classList.remove("show"));
$("#viewModalBg").addEventListener("click", e=>{ if(e.target.id==="viewModalBg") $("#viewModalBg").classList.remove("show"); });
$("#vWire").addEventListener("click", e=>{
  const v = ensureViewer(); v.wireOn=!v.wireOn; e.currentTarget.classList.toggle("on", v.wireOn);
  v.mats.forEach(mm=> mm.wireframe = v.wireOn);
});
$("#vMat").addEventListener("click", e=>{
  const v = ensureViewer(); v.matOn=!v.matOn; e.currentTarget.classList.toggle("on", v.matOn);
  v.mats.forEach(mm=>{ mm.userData.__prevColor = mm.userData.__prevColor || mm.color?.clone(); if(!v.matOn){ mm.color?.set(0x9a9a9a); } else if(mm.userData.__prevColor){ mm.color?.copy(mm.userData.__prevColor); } });
});
$("#vReset").addEventListener("click", ()=>{
  const v = ensureViewer(); if(!v.object3D) return;
  const box = new THREE.Box3().setFromObject(v.object3D);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x,size.y,size.z,0.0001);
  const dist = (maxDim/(2*Math.tan(THREE.MathUtils.degToRad(v.camera.fov)/2)))*1.8;
  v.camera.position.set(dist*0.7, dist*0.55, dist*0.7);
  v.controls.target.set(0,0,0); v.controls.update();
});
$("#vFull").addEventListener("click", ()=>{
  const stage = $("#viewerStage");

});
$("#btnDelModel").addEventListener("click", async ()=>{
  const m = models.find(x=>x.id===currentViewId);
  if(!m) return;

  toast("Model silindi.");
  $("#viewModalBg").classList.remove("show");
  await loadAll();
});
$("#btnEditMeta").addEventListener("click", ()=>{
  const id = currentViewId;
  $("#viewModalBg").classList.remove("show");
  if(id) openForm(id);
});

loadAll();
