<meta charset="utf-8">
<title>Materyal Kütüphanesi — Configurator Studio</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<style>
  :root{
    --bg-grad: radial-gradient(120% 100% at 26% -8%, #223056 0%, #0b0f18 58%);
    --panel: rgba(19,27,40,.66); --panel2: rgba(255,255,255,.055); --panel-solid:#161d2b;
    --ink:#F2F5F9; --dim:rgba(242,245,249,.56);
    --line:rgba(255,255,255,.10); --line2:rgba(255,255,255,.17);
    --accent:#7C5CFC; --accent2:#9C7CFF;
    --pink:#F0568F; --blue:#3B8BF5; --orange:#F5A623; --green:#33E08A; --purple:#8B5CF6;
    --err:#FF5C7A; --ok:#33E08A;
    --blur: blur(22px) saturate(170%);
    --r-lg:22px; --r-md:14px; --r-sm:9px; --r-pill:999px;
    --shadow-float: 0 18px 44px -18px rgba(0,0,0,.55);
    --font-ui:-apple-system,"Segoe UI",system-ui,sans-serif;
    --font-mono:"SF Mono","Consolas","Courier New",monospace;
  }
  :root[data-theme="light"]{
    --bg-grad: radial-gradient(120% 100% at 26% -8%, #EAF3F5 0%, #E6E8F7 55%, #EEF0FB 100%);
    --panel: rgba(255,255,255,.70); --panel2: rgba(20,30,50,.045); --panel-solid:#ffffff;
    --ink:#141A24; --dim:rgba(20,26,36,.58);
    --line:rgba(20,30,50,.09); --line2:rgba(20,30,50,.15);
    --accent:#6A45E8; --accent2:#8563F2;
    --pink:#E14E86; --blue:#2F76E0; --orange:#DE8A0C; --green:#149E63; --purple:#7C4CE0;
    --err:#E14367; --ok:#149E63;
    --shadow-float: 0 18px 40px -18px rgba(30,40,70,.22);
  }
  :root[data-theme="warm"]{
    --bg-grad: #F4EFE2;
    --panel:#FFFFFF; --panel2:#ECE6D5; --panel-solid:#FFFFFF;
    --ink:#17140F; --dim:#726C5C;
    --line:#DED5BB; --line2:#17140F;
    --accent:#2F6DF0; --accent2:#5089F5;
    --pink:#F3AD8C; --blue:#2F6DF0; --orange:#F0C13E; --green:#3E9B6B; --purple:#8A6CD6;
    --err:#E0523F; --ok:#3E9B6B;
    --blur: none;
    --shadow-float: 0 10px 24px -14px rgba(23,20,15,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--font-ui);color:var(--ink);background:var(--bg-grad);font-size:13.5px;-webkit-font-smoothing:antialiased}
  button,input,select,textarea{font-family:inherit}
  .app{display:grid;grid-template-rows:60px 1fr;height:100vh}
  .topbar{display:flex;align-items:center;gap:14px;padding:0 18px;border-bottom:1px solid var(--line);background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);z-index:5;box-shadow:var(--shadow-float)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:13.5px}
  .brand .mark{width:26px;height:26px;flex:0 0 auto;display:block;filter:drop-shadow(0 3px 6px rgba(30,15,80,.28))}
  .brand .mark svg{width:100%;height:100%;display:block}
  .nav{display:flex;gap:2px;margin-left:8px;background:var(--panel2);padding:3px;border-radius:var(--r-pill);border:1px solid var(--line)}
  .nav a{font-size:11.5px;font-weight:700;color:var(--dim);text-decoration:none;padding:7px 13px;border-radius:var(--r-pill);transition:.15s}
  .nav a:hover{color:var(--ink)}
  .nav a.on{background:linear-gradient(135deg, var(--accent2), var(--accent));color:#fff;box-shadow:0 4px 14px -4px var(--accent)}
  .spacer{flex:1}
  .btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:8px 15px;border-radius:var(--r-pill);border:1px solid var(--line2);background:var(--panel2);color:var(--ink);cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:linear-gradient(135deg, var(--accent2), var(--accent));border-color:transparent;color:#fff;box-shadow:0 6px 18px -6px var(--accent)}
  .btn.danger{border-color:var(--err);color:var(--err)}
  .btn.sm{padding:6px 12px;font-size:11px}
  .theme-toggle{width:34px;height:34px;border-radius:50%;border:1px solid var(--line2);background:var(--panel2);color:var(--dim);display:grid;place-items:center;cursor:pointer;transition:.15s;flex:0 0 auto}
  .theme-toggle:hover{color:var(--ink);border-color:var(--accent)}
  .theme-toggle svg{width:16px;height:16px}

  .body{display:grid;grid-template-columns:250px 1fr;min-height:0;overflow:hidden;gap:12px;padding:12px}
  .sidebar{border:1px solid var(--line);border-radius:var(--r-lg);background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);overflow-y:auto;padding:16px;box-shadow:var(--shadow-float)}
  .sidebar h3{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);margin:16px 0 8px;font-weight:800}
  .sidebar h3:first-child{margin-top:0}
  .sidebar input[type=text],.sidebar select{width:100%;padding:8px 10px;border-radius:var(--r-md);border:1px solid var(--line2);background:var(--panel2);color:var(--ink);font-size:12px}
  .chiplist{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
  .chip{font-size:10.5px;padding:4px 10px;border-radius:var(--r-pill);border:1px solid var(--line2);background:var(--panel2);color:var(--dim);cursor:pointer}
  .chip.on{background:linear-gradient(135deg, var(--accent2), var(--accent));border-color:transparent;color:#fff}
  .checkrow{display:flex;align-items:center;gap:7px;font-size:12px;margin-top:8px;cursor:pointer}

  .main{overflow-y:auto;padding:4px 8px 20px}
  .main-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .main-head h1{font-size:16px;margin:0;font-weight:800}
  .count{font-size:11.5px;color:var(--dim)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
  .card{border:1px solid var(--line);border-radius:var(--r-md);background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);overflow:hidden;cursor:pointer;transition:.15s;position:relative;box-shadow:var(--shadow-float)}
  .card:hover{border-color:var(--accent);transform:translateY(-3px)}
  .card .thumb{height:130px;background-size:cover;background-position:center;position:relative;background-color:var(--panel2)}
  .card .fav{position:absolute;top:8px;right:8px;width:27px;height:27px;border-radius:50%;background:rgba(10,14,22,.5);backdrop-filter:blur(6px);color:#fff;border:none;display:grid;place-items:center;cursor:pointer;font-size:13px}
  .card .fav.on{color:#ffcf4d}
  .card .send{position:absolute;top:8px;left:8px;width:27px;height:27px;border-radius:50%;background:rgba(10,14,22,.5);backdrop-filter:blur(6px);color:#fff;border:none;display:grid;place-items:center;cursor:pointer;font-size:13px;opacity:0;transition:opacity .12s}
  .card:hover .send{opacity:1}
  .card .badges{position:absolute;left:8px;bottom:8px;display:flex;gap:4px}
  .badge{font-size:9px;font-weight:800;padding:3px 7px;border-radius:var(--r-pill);background:rgba(10,14,22,.55);backdrop-filter:blur(6px);color:#fff}
  .card .info{padding:11px 12px}
  .card .n{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .m{font-size:10.5px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .price{font-size:11px;color:var(--accent);font-weight:800;margin-top:5px}
  .empty{padding:60px 20px;text-align:center;color:var(--dim)}
  .empty b{display:block;font-size:14px;color:var(--ink);margin-bottom:6px}

  .modal-bg{position:fixed;inset:0;background:rgba(6,9,16,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:var(--panel-solid);border:1px solid var(--line);border-radius:var(--r-lg);width:min(760px,100%);max-height:88vh;overflow-y:auto;box-shadow:0 30px 80px -20px rgba(0,0,0,.6)}
  .modal-head{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel-solid)}
  .modal-head h2{font-size:14px;margin:0;flex:1;font-weight:800}
  .modal-body{padding:18px}
  .modal-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--line2);background:var(--panel2);color:var(--ink);cursor:pointer;font-size:14px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-grid.full{grid-template-columns:1fr}
  .f{display:flex;flex-direction:column;gap:4px}
  .f label{font-size:10.5px;color:var(--dim);font-weight:700}
  .f input,.f select,.f textarea{padding:9px 10px;border-radius:var(--r-md);border:1px solid var(--line2);background:var(--panel2);color:var(--ink);font-size:12.5px}
  .f textarea{resize:vertical;min-height:56px}
  .maps-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
  .map-thumb{border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;text-align:center;background:var(--panel2)}
  .map-thumb .sw{height:64px;background-size:cover;background-position:center;background-color:var(--panel2)}
  .map-thumb .lbl{font-size:9.5px;padding:5px;color:var(--dim)}
  .map-thumb a{display:block;font-size:9.5px;padding:4px;color:var(--accent);text-decoration:none;border-top:1px solid var(--line)}
  .modal-actions{display:flex;gap:8px;padding:14px 18px;border-top:1px solid var(--line);position:sticky;bottom:0;background:var(--panel-solid)}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(10px);background:var(--panel-solid);color:var(--ink);border:1px solid var(--line2);font-size:12.5px;font-weight:600;padding:11px 18px;border-radius:var(--r-pill);opacity:0;transition:.25s;pointer-events:none;z-index:99;box-shadow:var(--shadow-float)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--err);border-color:var(--err);color:#fff}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}

  [data-theme="warm"] .topbar,
  [data-theme="warm"] .sidebar,
  [data-theme="warm"] .card,
  [data-theme="warm"] .modal,
  [data-theme="warm"] .toast{ border-width:1.5px; border-color:var(--line2) }
  [data-theme="warm"] .btn.primary,
  [data-theme="warm"] .nav a.on,
  [data-theme="warm"] .chip.on{ background:var(--ink); color:#fff; box-shadow:none }
  [data-theme="warm"] .brand{ font-weight:900; letter-spacing:-.3px }
  [data-theme="warm"] .main-head h1{ font-weight:900 }
</style>

<div class="app">
  <div class="topbar">
    <div class="brand"><span class="mark"><svg viewBox="0 0 48 48" aria-hidden="true"><rect x="10" y="16" width="20" height="20" rx="6" fill="var(--orange)" transform="rotate(-10 20 26)"/><rect x="15" y="11" width="20" height="20" rx="6" fill="var(--blue)" transform="rotate(6 25 21)"/><rect x="13" y="18" width="20" height="20" rx="6" fill="var(--pink)" transform="rotate(-2 23 28)"/></svg></span>Configurator Studio</div>
    <nav class="nav">
      <a href="../03_ARAC/model-material-editor.html" data-nav="editor">Editör</a>
      <a href="material-library.html" data-nav="materials" class="on">Materyal Kütüphanesi</a>
      <a href="model-library.html" data-nav="models">Model Kütüphanesi</a>
    </nav>
    <div class="spacer"></div>
    <button class="btn primary" id="btnNew">+ Yeni Materyal</button>
    <button class="theme-toggle" id="themeToggle" title="Açık/koyu tema">
      <svg id="themeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
      <svg id="themeIconWarm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M12 2c2 3 4 5.5 4 9a4 4 0 0 1-8 0c0-1 .3-1.8.8-2.6.3.9 1 1.6 1.2 1 .3-.9-.3-2-.3-3.4 0-1.6.9-3 2.3-4Z"/></svg>
    </button>
  </div>

  <div class="body">
    <div class="sidebar">
      <h3>Ara</h3>
      <input type="text" id="fSearch" placeholder="Ad, marka, kod, etiket…">

      <h3>Marka</h3>
      <select id="fBrand"><option value="">Tümü</option></select>

      <h3>Kategori</h3>
      <select id="fCategory"><option value="">Tümü</option></select>

      <h3>Koleksiyon</h3>
      <select id="fCollection"><option value="">Tümü</option></select>

      <label class="checkrow"><input type="checkbox" id="fFav"> Yalnız favoriler</label>
      <label class="checkrow"><input type="checkbox" id="fPbr"> Yalnız PBR-tam (Base+Rough+Normal)</label>

      <h3>Etiketler</h3>
      <div class="chiplist" id="tagChips"></div>
    </div>

    <div class="main">
      <div class="main-head">
        <h1>Materyal Kütüphanesi</h1>
        <span class="count" id="resultCount"></span>
      </div>
      <div id="grid" class="grid"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">Materyal</h2>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { dbGetAll, dbPut, dbDelete, dbGet, newId, blankMaterial } from './js/db.js';
import { enforceAccessGate } from '../assets/access-gate.js';

await enforceAccessGate();

const $ = s => document.querySelector(s);
function toast(msg, isErr){
  const t = $("#toast"); t.textContent = msg; t.className = "toast show" + (isErr?" err":"");
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 3000);
}

/* ---- Editöre gönder — localStorage üzerinden "beklemede" işareti bırakıp yönlendirir;
   editör açılışında bunu okuyup uygular (aynı origin/aynı IndexedDB paylaşıldığı için çalışır). ---- */
function sendToEditor(type, id){
  localStorage.setItem("cs_pending_import", JSON.stringify({ type, id }));
  window.location.href = "../03_ARAC/model-material-editor.html";
}

/* ---- Tema geçişi (koyu/açık/sıcak) — editördeki seçimle aynı localStorage anahtarını paylaşır ---- */
const THEME_ORDER = ["dark", "light", "warm"];
function applyThemeIcon(theme){
  $("#themeIconSun").style.display = theme === "light" ? "" : "none";
  $("#themeIconMoon").style.display = theme === "dark" ? "" : "none";
  $("#themeIconWarm").style.display = theme === "warm" ? "" : "none";
}
(function initTheme(){
  const saved = localStorage.getItem("cs_theme") || "dark";
  document.documentElement.dataset.theme = saved;
  applyThemeIcon(saved);
})();
$("#themeToggle").addEventListener("click", ()=>{
  const cur = document.documentElement.dataset.theme || "dark";
  const next = THEME_ORDER[(THEME_ORDER.indexOf(cur) + 1) % THEME_ORDER.length];
  document.documentElement.dataset.theme = next;
  localStorage.setItem("cs_theme", next);
  applyThemeIcon(next);
});

const TEX_LABELS = { map:"Base Color", normalMap:"Normal", roughnessMap:"Roughness", metalnessMap:"Metalness", aoMap:"Occlusion", displacementMap:"Height", emissiveMap:"Emissive" };

let materials = [];
let objectUrls = []; // her render'da oluşturulan blob URL'leri — bir sonraki render'da temizlenir (bellek sızıntısı önlenir)

function revokeAllUrls(){ objectUrls.forEach(u=>URL.revokeObjectURL(u)); objectUrls = []; }
function urlFor(blob){ if(!blob) return null; const u = URL.createObjectURL(blob); objectUrls.push(u); return u; }

async function loadAll(){
  materials = await dbGetAll("materials");
  materials.sort((a,b)=> (b.updatedAt||"").localeCompare(a.updatedAt||""));
  populateFilterOptions();
  render();
}

function populateFilterOptions(){
  const brands = [...new Set(materials.map(m=>m.brand).filter(Boolean))].sort();
  const cats = [...new Set(materials.map(m=>m.category).filter(Boolean))].sort();
  const tags = [...new Set(materials.flatMap(m=>m.tags||[]))].sort();
  const curBrand = $("#fBrand").value, curCat = $("#fCategory").value;
  $("#fBrand").innerHTML = '<option value="">Tümü</option>' + brands.map(b=>`<option ${b===curBrand?'selected':''}>${b}</option>`).join("");
  $("#fCategory").innerHTML = '<option value="">Tümü</option>' + cats.map(c=>`<option ${c===curCat?'selected':''}>${c}</option>`).join("");
  $("#tagChips").innerHTML = tags.map(t=>`<button class="chip" data-tag="${t}">${t}</button>`).join("") || '<span style="font-size:11px;color:var(--dim)">Henüz etiket yok</span>';
  $("#tagChips").querySelectorAll("[data-tag]").forEach(c=>c.addEventListener("click", ()=>{ c.classList.toggle("on"); render(); }));
}

function activeTagFilters(){ return [...document.querySelectorAll("#tagChips .chip.on")].map(c=>c.dataset.tag); }

function filtered(){
  const q = $("#fSearch").value.trim().toLowerCase();
  const brand = $("#fBrand").value, cat = $("#fCategory").value;
  const favOnly = $("#fFav").checked, pbrOnly = $("#fPbr").checked;
  const tags = activeTagFilters();
  return materials.filter(m=>{
    if(q && !(`${m.name} ${m.brand} ${m.productCode} ${(m.tags||[]).join(" ")}`.toLowerCase().includes(q))) return false;
    if(brand && m.brand !== brand) return false;
    if(cat && m.category !== cat) return false;
    if(favOnly && !m.favorite) return false;
    if(pbrOnly && !(m.maps?.map && m.maps?.roughnessMap && m.maps?.normalMap)) return false;
    if(tags.length && !tags.every(t=>(m.tags||[]).includes(t))) return false;
    return true;
  });
}

function pbrBadges(m){
  const n = ["map","roughnessMap","normalMap","metalnessMap","aoMap","displacementMap"].filter(k=>m.maps?.[k]).length;
  return `<span class="badge">${n}/6 PBR</span>`;
}

function render(){
  revokeAllUrls();
  const list = filtered();
  $("#resultCount").textContent = list.length + " materyal";
  const el = $("#grid");
  if(!list.length){
    el.innerHTML = `<div class="empty" style="grid-column:1/-1"><b>Materyal bulunamadı</b>Model & Malzeme Editörü'nde bir malzeme hazırlayıp "Kütüphaneye Kaydet" ile buraya ekleyebilirsin.</div>`;
    return;
  }
  el.innerHTML = list.map(m=>{
    const bg = m.maps?.map ? `background-image:url(${urlFor(m.maps.map)})` : `background:${m.color||'#cfcac0'}`;
    return `
    <div class="card" data-id="${m.id}" draggable="true" title="Editöre sürükleyip bırakabilir ya da → ile gönderebilirsin">
      <div class="thumb" style="${bg}">
        <button class="fav ${m.favorite?'on':''}" data-favbtn="${m.id}">★</button>
        <button class="send" data-sendbtn="${m.id}" title="Editöre Aktar">➜</button>
        <div class="badges">${pbrBadges(m)}</div>
      </div>
      <div class="info">
        <div class="n">${m.name || "(isimsiz)"}</div>
        <div class="m">${[m.brand,m.category].filter(Boolean).join(" · ") || "—"}</div>
        ${m.price ? `<div class="price">${m.price} ${m.currency||''}</div>` : ""}
      </div>
    </div>`;
  }).join("");
  el.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("click", e=>{
      if(e.target.closest("[data-favbtn],[data-sendbtn]")) return;
      openDetail(card.dataset.id);
    });
    card.addEventListener("dragstart", e=>{
      e.dataTransfer.setData("application/x-cs-item", JSON.stringify({ type:"material", id: card.dataset.id }));
      e.dataTransfer.effectAllowed = "copy";
    });
  });
  el.querySelectorAll("[data-sendbtn]").forEach(btn=>{
    btn.addEventListener("click", e=>{
      e.stopPropagation();
      sendToEditor("material", btn.dataset.sendbtn);
    });
  });
  el.querySelectorAll("[data-favbtn]").forEach(btn=>{
    btn.addEventListener("click", async e=>{
      e.stopPropagation();
      const m = materials.find(x=>x.id===btn.dataset.favbtn);
      m.favorite = !m.favorite; m.updatedAt = new Date().toISOString();
      await dbPut("materials", m);
      render();
    });
  });
}

["fSearch","fBrand","fCategory","fFav","fPbr"].forEach(id=>{
  $("#"+id).addEventListener("input", render);
  $("#"+id).addEventListener("change", render);
});

function fieldRow(label, inputHtml){ return `<div class="f"><label>${label}</label>${inputHtml}</div>`; }

function openDetail(id){
  const m = id ? materials.find(x=>x.id===id) : blankMaterial();
  const isNew = !id;
  $("#modalTitle").textContent = isNew ? "Yeni Materyal" : (m.name || "Materyal");
  $("#modalBody").innerHTML = `
    <div class="form-grid">
      ${fieldRow("Ad", `<input data-f="name" value="${m.name||''}">`)}
      ${fieldRow("Ürün Adı", `<input data-f="productName" value="${m.productName||''}">`)}
      ${fieldRow("Ürün Kodu", `<input data-f="productCode" value="${m.productCode||''}">`)}
      ${fieldRow("Marka", `<input data-f="brand" value="${m.brand||''}">`)}
      ${fieldRow("Üretici", `<input data-f="manufacturer" value="${m.manufacturer||''}">`)}
      ${fieldRow("Koleksiyon", `<input data-f="collectionName" value="${m.collectionName||''}">`)}
      ${fieldRow("Kategori", `<input data-f="category" value="${m.category||''}">`)}
      ${fieldRow("Alt Kategori", `<input data-f="subcategory" value="${m.subcategory||''}">`)}
      ${fieldRow("Renk", `<input type="color" data-f="color" value="${m.color||'#cfcac0'}">`)}
      ${fieldRow("Etiketler (virgülle)", `<input data-f="tagsText" value="${(m.tags||[]).join(', ')}">`)}
      ${fieldRow("Fiyat", `<input type="number" data-f="price" value="${m.price??''}">`)}
      ${fieldRow("Para Birimi", `<input data-f="currency" value="${m.currency||'TRY'}">`)}
      ${fieldRow("Stok", `<input type="number" data-f="stock" value="${m.stock??''}">`)}
      ${fieldRow("Fiziksel Ölçü (En×Boy)", `<div style="display:flex;gap:6px"><input type="number" data-f="physicalWidth" value="${m.physicalWidth??''}" style="flex:1"><input type="number" data-f="physicalHeight" value="${m.physicalHeight??''}" style="flex:1"><select data-f="physicalUnit" style="flex:0 0 64px"><option ${m.physicalUnit==='mm'?'selected':''}>mm</option><option ${m.physicalUnit==='cm'?'selected':''}>cm</option><option ${m.physicalUnit==='m'?'selected':''}>m</option><option ${m.physicalUnit==='inch'?'selected':''}>inch</option></select></div>`)}
    </div>
    <div class="form-grid full" style="margin-top:12px">
      ${fieldRow("Açıklama", `<textarea data-f="description">${m.description||''}</textarea>`)}
    </div>
    ${Object.keys(m.maps||{}).length ? `
      <div class="maps-row">
        ${Object.entries(m.maps).map(([key,blob])=>`
          <div class="map-thumb">
            <div class="sw" style="background-image:url(${urlFor(blob)})"></div>
            <div class="lbl">${TEX_LABELS[key]||key}</div>
            <a href="${urlFor(blob)}" download="${(m.name||'material')}_${key}.png">İndir</a>
          </div>`).join("")}
      </div>` : `<div style="margin-top:14px;font-size:11px;color:var(--dim)">Bu kayda henüz doku eklenmemiş — Model &amp; Malzeme Editörü'nden "Kütüphaneye Kaydet" ile PBR haritaları da beraber taşınır.</div>`}
  `;
  $("#modalActions").innerHTML = `
    ${!isNew ? `<button class="btn sm" id="btnDup">⧉ Kopyala</button>` : ""}
    ${!isNew ? `<button class="btn sm danger" id="btnDel">🗑 Sil</button>` : ""}
    <div style="flex:1"></div>
    <button class="btn sm" id="btnCancel">Vazgeç</button>
    <button class="btn sm primary" id="btnSave">Kaydet</button>
  `;
  $("#modalBg").classList.add("show");

  $("#modalClose").onclick = $("#btnCancel").onclick = ()=> $("#modalBg").classList.remove("show");
  const dup = $("#btnDup"); if(dup) dup.onclick = async ()=>{
    const copy = { ...m, id: newId("mat"), name: (m.name||"Materyal") + " (kopya)", createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    await dbPut("materials", copy);
    toast("Materyal kopyalandı.");
    $("#modalBg").classList.remove("show");
    await loadAll();
  };
  const del = $("#btnDel"); if(del) del.onclick = async ()=>{
    if(!confirm(`"${m.name||'Bu materyal'}" silinsin mi? Bu işlem geri alınamaz.`)) return;
    await dbDelete("materials", m.id);
    toast("Materyal silindi.");
    $("#modalBg").classList.remove("show");
    await loadAll();
  };
  $("#btnSave").onclick = async ()=>{
    const body = $("#modalBody");
    const val = (f)=> body.querySelector(`[data-f="${f}"]`)?.value;
    m.name = val("name"); m.productName = val("productName"); m.productCode = val("productCode");
    m.brand = val("brand"); m.manufacturer = val("manufacturer"); m.collectionName = val("collectionName");
    m.category = val("category"); m.subcategory = val("subcategory"); m.color = val("color");
    m.tags = (val("tagsText")||"").split(",").map(s=>s.trim()).filter(Boolean);
    m.price = val("price") ? +val("price") : null;
    m.currency = val("currency"); m.stock = val("stock") ? +val("stock") : null;
    m.physicalWidth = val("physicalWidth") ? +val("physicalWidth") : null;
    m.physicalHeight = val("physicalHeight") ? +val("physicalHeight") : null;
    m.physicalUnit = val("physicalUnit");
    m.description = val("description");
    m.updatedAt = new Date().toISOString();
    if(!m.name){ toast("Materyal adı zorunlu.", true); return; }
    await dbPut("materials", m);
    toast("Materyal kaydedildi.");
    $("#modalBg").classList.remove("show");
    await loadAll();
  };
}

$("#btnNew").addEventListener("click", ()=> openDetail(null));
$("#modalBg").addEventListener("click", e=>{ if(e.target.id==="modalBg") $("#modalBg").classList.remove("show"); });

loadAll();
</script>
