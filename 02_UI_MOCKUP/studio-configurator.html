<meta charset="utf-8">
<title>Configurator — Minimal Studio</title>
<style>
  :root{
    --bg:#EEECE7; --panel:#FBFAF8; --panel2:#F3F1EC;
    --ink:#16181B; --dim:#6B6E73;
    --line:#DEDBD3; --line2:#CFCBC0;
    --accent:#B4622C; --accent-ink:#3A2109;
    --ok:#3E8E5A; --font-ui:-apple-system,"Segoe UI",system-ui,sans-serif;
    --font-mono:"SF Mono","Consolas","Courier New",monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#17181A; --panel:#1F2124; --panel2:#26282B;
      --ink:#EDEEEF; --dim:#9A9DA3; --line:#33363A; --line2:#3D4045;
      --accent:#D98A4F; --accent-ink:#2A1607;
    }
  }
  :root[data-theme="light"]{ --bg:#EEECE7; --panel:#FBFAF8; --panel2:#F3F1EC; --ink:#16181B; --dim:#6B6E73; --line:#DEDBD3; --line2:#CFCBC0; --accent:#B4622C; }
  :root[data-theme="dark"]{ --bg:#17181A; --panel:#1F2124; --panel2:#26282B; --ink:#EDEEEF; --dim:#9A9DA3; --line:#33363A; --line2:#3D4045; --accent:#D98A4F; }

  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:var(--font-ui);color:var(--ink);background:var(--bg);font-size:13.5px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit}
  .tabular{font-variant-numeric:tabular-nums;font-family:var(--font-mono)}

  .app{display:grid;grid-template-rows:52px 1fr;height:100vh}

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--line);
    background:var(--panel);z-index:20;
  }
  .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px;letter-spacing:-.1px}
  .brand .mark{width:20px;height:20px;border-radius:5px;background:var(--accent);position:relative;flex:0 0 auto}
  .brand .mark::after{content:"";position:absolute;inset:5px;border:1.5px solid var(--panel);border-radius:2px}
  .crumb{color:var(--dim);font-size:12px}
  .crumb b{color:var(--ink);font-weight:600}
  .top-tools{display:flex;align-items:center;gap:4px;margin-left:8px}
  .icon-btn{
    width:30px;height:30px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--dim);
    display:grid;place-items:center;cursor:pointer;transition:.12s;
  }
  .icon-btn:hover{background:var(--panel2);color:var(--ink);border-color:var(--line)}
  .icon-btn svg{width:15px;height:15px}
  .spacer{flex:1}
  .price-box{display:flex;align-items:baseline;gap:8px;padding:6px 4px}
  .price-box .lbl{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
  .price-box .val{font-size:17px;font-weight:700}
  .btn{
    display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;padding:7px 13px;
    border-radius:8px;border:1px solid var(--line2);background:var(--panel);color:var(--ink);cursor:pointer;transition:.12s;
  }
  .btn:hover{border-color:var(--ink)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{filter:brightness(1.06)}
  .avatar{width:28px;height:28px;border-radius:50%;background:var(--panel2);border:1px solid var(--line);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--dim)}

  /* ---------- Body grid ---------- */
  .body{display:grid;grid-template-columns:236px 1fr 300px;min-height:0}

  /* ---------- Left: catalog ---------- */
  .catalog{border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-height:0}
  .cat-head{padding:14px 14px 10px}
  .cat-head h2{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);margin:0 0 10px;font-weight:700}
  .search{display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 10px}
  .search svg{width:13px;height:13px;color:var(--dim);flex:0 0 auto}
  .search input{border:none;background:none;outline:none;font-size:12.5px;color:var(--ink);width:100%}
  .search input::placeholder{color:var(--dim)}
  .cat-list{flex:1;overflow-y:auto;padding:4px 8px 14px}
  .cat-item{
    display:flex;gap:10px;align-items:center;padding:8px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:.12s;
  }
  .cat-item:hover{background:var(--panel2)}
  .cat-item.on{background:var(--panel2);border-color:var(--line2)}
  .cat-thumb{
    width:38px;height:38px;border-radius:7px;background:var(--panel2);border:1px solid var(--line);flex:0 0 auto;
    display:grid;place-items:center;overflow:hidden;
  }
  .cat-item.on .cat-thumb{border-color:var(--accent)}
  .cat-thumb svg{width:20px;height:20px;color:var(--dim)}
  .cat-info{min-width:0}
  .cat-info .n{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cat-info .p{font-size:11px;color:var(--dim);margin-top:1px}
  .cat-tag{
    margin-left:auto;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--accent);
    background:color-mix(in srgb, var(--accent) 14%, transparent);padding:2px 6px;border-radius:5px;flex:0 0 auto;
  }
  .cat-foot{padding:12px 14px;border-top:1px solid var(--line)}
  .cat-foot .btn{width:100%;justify-content:center}

  /* ---------- Center: viewport ---------- */
  .viewport-wrap{position:relative;overflow:hidden;background:var(--stage,#cfcac0)}
  #stage-bg{position:absolute;inset:0}
  .perspective{position:absolute;inset:0;display:grid;place-items:center;perspective:1400px;cursor:grab}
  .perspective.dragging{cursor:grabbing}
  #rig{transform-style:preserve-3d;transition:transform .05s linear}
  .box3d{position:absolute;transform-style:preserve-3d}
  .face{position:absolute;background:#ccc;border:1px solid rgba(0,0,0,.06)}

  .contact-shadow{
    position:absolute;left:50%;bottom:0;width:260px;height:60px;border-radius:50%;
    background:radial-gradient(closest-side, rgba(0,0,0,.32), transparent 72%);
    transform:translate(-50%, 30%);filter:blur(2px);pointer-events:none;
  }

  .vp-hud{position:absolute;left:16px;bottom:14px;display:flex;flex-direction:column;gap:4px;pointer-events:none}
  .hud-chip{
    font-family:var(--font-mono);font-size:10.5px;color:rgba(20,20,20,.55);background:rgba(255,255,255,.55);
    backdrop-filter:blur(6px);border:1px solid rgba(0,0,0,.08);padding:4px 8px;border-radius:6px;width:fit-content;
  }
  :root[data-theme="dark"] .hud-chip{color:rgba(255,255,255,.65);background:rgba(0,0,0,.35);border-color:rgba(255,255,255,.1)}
  @media (prefers-color-scheme:dark){ .hud-chip{color:rgba(255,255,255,.65);background:rgba(0,0,0,.35);border-color:rgba(255,255,255,.1)} }

  .vp-toolbar{
    position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:2px;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px;box-shadow:0 6px 20px -8px rgba(0,0,0,.25);
  }
  .vp-toolbar .icon-btn.on{background:var(--panel2);color:var(--accent)}

  .vp-zoom{position:absolute;right:16px;bottom:14px;display:flex;flex-direction:column;gap:2px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px;box-shadow:0 6px 20px -8px rgba(0,0,0,.25)}

  .product-title{position:absolute;left:16px;top:14px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px;box-shadow:0 6px 20px -8px rgba(0,0,0,.2)}
  .product-title .n{font-size:13px;font-weight:700}
  .product-title .s{font-size:10.5px;color:var(--dim);margin-top:1px}

  /* ---------- Right: config panel ---------- */
  .config{border-left:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-height:0}
  .seg{display:flex;gap:2px;padding:12px;border-bottom:1px solid var(--line)}
  .seg button{
    flex:1;padding:8px 6px;border-radius:8px;border:1px solid transparent;background:none;color:var(--dim);
    font-size:12px;font-weight:600;cursor:pointer;transition:.12s;
  }
  .seg button.on{background:var(--panel2);color:var(--ink);border-color:var(--line2)}
  .config-body{flex:1;overflow-y:auto;padding:16px}
  .slot{margin-bottom:22px}
  .slot-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .slot-head h3{font-size:11.5px;font-weight:700;margin:0}
  .slot-head .cur{font-size:11px;color:var(--dim)}
  .swatches{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .swatch{
    aspect-ratio:1;border-radius:9px;cursor:pointer;position:relative;border:2px solid transparent;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);transition:.12s;
  }
  .swatch:hover{transform:translateY(-1px)}
  .swatch.on{border-color:var(--accent)}
  .swatch.on::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:13px;text-shadow:0 1px 2px rgba(0,0,0,.4)}
  .swatch .lbl{position:absolute;left:0;right:0;bottom:-17px;text-align:center;font-size:9.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .custom-color{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:14px;border-top:1px dashed var(--line)}
  .cc-swatch{width:34px;height:34px;border-radius:9px;border:2px solid var(--line2);flex:0 0 auto;position:relative;overflow:hidden}
  .cc-swatch input[type=color]{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);border:none;padding:0;cursor:pointer}
  .cc-text{font-size:11.5px}
  .cc-text b{display:block;font-weight:600;font-size:12px}
  .cc-text span{color:var(--dim);font-family:var(--font-mono);font-size:10.5px}

  .light-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .light-card{
    border:1.5px solid var(--line);border-radius:11px;padding:12px;cursor:pointer;transition:.12s;text-align:left;background:var(--panel2);
  }
  .light-card:hover{border-color:var(--line2)}
  .light-card.on{border-color:var(--accent);background:color-mix(in srgb, var(--accent) 8%, var(--panel2))}
  .light-swatch{height:34px;border-radius:7px;margin-bottom:8px}
  .light-card b{font-size:11.5px;display:block}
  .light-card span{font-size:10px;color:var(--dim)}
  .range-row{margin-top:16px}
  .range-row label{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-bottom:6px}
  .range-row label b{color:var(--ink);font-family:var(--font-mono);font-weight:600}
  input[type=range]{width:100%;accent-color:var(--accent)}

  .size-row{display:flex;gap:8px}
  .size-btn{flex:1;padding:12px 6px;border-radius:9px;border:1.5px solid var(--line);background:var(--panel2);cursor:pointer;text-align:center;transition:.12s}
  .size-btn:hover{border-color:var(--line2)}
  .size-btn.on{border-color:var(--accent);background:color-mix(in srgb, var(--accent) 8%, var(--panel2))}
  .size-btn b{display:block;font-size:13px}
  .size-btn span{font-size:9.5px;color:var(--dim)}

  .price-list{border-top:1px solid var(--line);padding:14px 16px;flex:0 0 auto}
  .pl-row{display:flex;justify-content:space-between;font-size:11.5px;padding:4px 0;color:var(--dim)}
  .pl-row.total{color:var(--ink);font-weight:700;font-size:13px;border-top:1px solid var(--line);margin-top:6px;padding-top:10px}
  .pl-row .v{font-family:var(--font-mono)}

  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important} }
</style>

<div class="app">
  <!-- ================= TOP BAR ================= -->
  <div class="topbar">
    <div class="brand"><span class="mark"></span>Configurator</div>
    <div class="crumb">Katalog / <b>Atlas Lounge Chair</b></div>
    <div class="top-tools">
      <button class="icon-btn" title="Geri al"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 0 12h-2"/></svg></button>
      <button class="icon-btn" title="Yinele"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 14 5-5-5-5"/><path d="M20 9H10a6 6 0 0 0 0 12h2"/></svg></button>
    </div>
    <div class="spacer"></div>

    <button class="btn primary"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M7 8l5-5 5 5"/><path d="M12 3v13"/></svg>Dışa Aktar</button>

  <!-- ================= BODY ================= -->
  <div class="body">
    <!-- LEFT: catalog -->
    <div class="catalog">
      <div class="cat-head">
        <h2>Katalog</h2>
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input placeholder="Ürün ara…">
        </div>
      </div>
      <div class="cat-list" id="catList"></div>

    <div class="viewport-wrap" id="stageWrap">
      <div id="stage-bg"></div>
      <div class="perspective" id="perspective">
        <div id="rig"></div>
      </div>

      <div class="product-title">
        <div class="n">Atlas Lounge Chair</div>
        <div class="s" id="variantLine">Meşe · Ahşap Ayak · Krem Kumaş</div>
      </div>

      <div class="vp-toolbar">
        <button class="icon-btn on" title="Döndür"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg></button>
        <button class="icon-btn" title="Izgara" id="gridToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg></button>
        <button class="icon-btn" title="Görünümü sıfırla" id="resetView"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 4v5h5"/></svg></button>
        <button class="icon-btn" title="Tam ekran"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M8 21H5a2 2 0 0 1-2-2v-3"/></svg></button>
      </div>

      <div class="vp-zoom">
        <button class="icon-btn" id="zoomIn" title="Yakınlaştır"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M11 8v6M8 11h6M21 21l-4.3-4.3"/></svg></button>
        <button class="icon-btn" id="zoomOut" title="Uzaklaştır"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M8 11h6M21 21l-4.3-4.3"/></svg></button>

      <div class="vp-hud">

    </div>

    <!-- RIGHT: config -->
    <div class="config">
      <div class="seg">
        <button class="on" data-tab="material">Malzeme</button>
        <button data-tab="light">Aydınlatma</button>
        <button data-tab="variant">Varyant</button>
      </div>

      <div class="config-body">
        <!-- MATERIAL TAB -->
        <div id="tab-material">
          <div class="slot">
            <div class="slot-head"><h3>Gövde</h3><span class="cur" id="cur-govde">Meşe</span></div>
            <div class="swatches" id="sw-govde"></div>

          <div class="slot">
            <div class="slot-head"><h3>Ayaklar</h3><span class="cur" id="cur-ayak">Ahşap</span></div>
            <div class="swatches" id="sw-ayak"></div>

              <div class="cc-swatch" id="ccSwatch"><input type="color" id="ccInput" value="#c9a876"></div>

            </div>
          </div>
        </div>

        <!-- LIGHT TAB -->
        <div id="tab-light" style="display:none">
          <div class="slot">
            <div class="slot-head"><h3>Ortam Ön Ayarı</h3></div>
            <div class="light-grid" id="lightGrid"></div>
          </div>

      <div class="price-list" id="priceList"></div>

<script>
/* ============================================================
   VERİ MODELİ — 01_MIMARI/02_Data-Driven-Core.md ile birebir:
   F_Product / F_VariantSlot / F_MaterialOption şeması burada
   düz JS objeleriyle temsil edildi.
   ============================================================ */
const CATALOG = [
  {id:"chair_atlas", name:"Atlas Lounge Chair", price:18400, cat:"Sandalye", active:true},
  {id:"lamp_orbit",  name:"Orbit Floor Lamp",   price:6200,  cat:"Aydınlatma"},
  {id:"table_mono",  name:"Mono Side Table",    price:9800,  cat:"Masa"},
  {id:"shelf_delta", name:"Delta Wall Shelf",   price:4300,  cat:"Depolama"},
  {id:"pot_terra",   name:"Terra Plant Pot",    price:1450,  cat:"Aksesuar"},
];

const MATS = {
  govde: [
    {id:"mese",   name:"Meşe",         color:"#B9835A", finish:"matte"},
    {id:"ceviz",  name:"Ceviz",        color:"#5B3A26", finish:"matte"},
    {id:"antra",  name:"Antrasit Mat", color:"#3B3D40", finish:"matte", delta:600},
    {id:"beyaz",  name:"Beyaz Mat",    color:"#E9E6DD", finish:"matte"},
  ],
  ayak: [
    {id:"ahsap",  name:"Ahşap",        color:"#7A5033", finish:"matte"},
    {id:"celik",  name:"Siyah Çelik",  color:"#22232A", finish:"metal", delta:450},
    {id:"pirinc", name:"Pirinç",       color:"#C8A24B", finish:"metal", delta:900},
  ],
  kumas: [
    {id:"krem",   name:"Krem",   color:"#D8CBB0"},
    {id:"tugla",  name:"Tuğla",  color:"#A85C42", delta:300},
    {id:"zumrut", name:"Zümrüt", color:"#2F5C4A", delta:300},
    {id:"lacivert",name:"Lacivert",color:"#26344F", delta:300},
  ],
};

const LIGHTS = [
  {id:"studio", name:"Stüdyo",     desc:"Nötr, yumuşak",  bg:["#E7E4DD","#CFCAC0"], key:1.0,  contrast:1.0, shadow:"rgba(0,0,0,.32)"},
  {id:"gallery",name:"Galeri",     desc:"Sıcak spot",     bg:["#EAE0CE","#C9B389"], key:1.08, contrast:1.05, shadow:"rgba(40,20,0,.35)"},
  {id:"sunset", name:"Gün Batımı", desc:"Dramatik, sıcak", bg:["#E9B583","#8A4A3C"], key:1.15, contrast:1.2, shadow:"rgba(50,10,0,.4)"},
  {id:"night",  name:"Gece",       desc:"Yüksek kontrast", bg:["#3A3D44","#141518"], key:0.85, contrast:1.35, shadow:"rgba(0,0,0,.55)"},
];

const SIZES = [
  {id:"s", name:"S", desc:"92cm", scale:0.88},
  {id:"m", name:"M", desc:"104cm", scale:1.0},
  {id:"l", name:"L", desc:"118cm", scale:1.12, delta:750},
];

let state = { govde:"mese", ayak:"ahsap", kumas:"krem", customKumas:null, light:"studio", intensity:100, reflection:30, size:"m", arms:true };

const $ = s => document.querySelector(s);
const fmtTL = n => "₺" + n.toLocaleString("tr-TR");

/* ---------------- Fiyat ---------------- */
function calcPrice(){
  const base = CATALOG[0].price;
  let d = 0;
  const g = MATS.govde.find(m=>m.id===state.govde); d += g.delta||0;
  const a = MATS.ayak.find(m=>m.id===state.ayak); d += a.delta||0;
  if(!state.customKumas){ const k = MATS.kumas.find(m=>m.id===state.kumas); d += k.delta||0; } else { d += 350; }
  const sz = SIZES.find(s=>s.id===state.size); d += sz.delta||0;
  if(!state.arms) d -= 400;
  return {base, delta:d, total:base+d};
}
function renderPrice(){
  const p = calcPrice();
  $("#topPrice").textContent = fmtTL(p.total);
  $("#priceList").innerHTML = `
    <div class="pl-row"><span>Taban fiyat</span><span class="v">${fmtTL(p.base)}</span></div>
    <div class="pl-row"><span>Seçenek farkı</span><span class="v">${p.delta>=0?"+":""}${fmtTL(p.delta)}</span></div>
    <div class="pl-row total"><span>Toplam</span><span class="v">${fmtTL(p.total)}</span></div>`;
}

/* ---------------- Katalog listesi ---------------- */
function renderCatalog(){
  $("#catList").innerHTML = CATALOG.map(p=>`
    <div class="cat-item ${p.active?'on':''}" data-id="${p.id}">
      <div class="cat-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="4" width="16" height="16" rx="2"/></svg></div>
      <div class="cat-info"><div class="n">${p.name}</div><div class="p tabular">${fmtTL(p.price)}</div></div>
      ${p.active?'<div class="cat-tag">Aktif</div>':''}
    </div>`).join("");
  document.querySelectorAll(".cat-item").forEach(el=>el.onclick=()=>{
    if(el.classList.contains("on")) return;
    document.querySelectorAll(".cat-item").forEach(x=>x.classList.remove("on"));
    el.classList.add("on");
  });
}

/* ---------------- Malzeme sekmesi ---------------- */
function renderSwatches(key, containerId, curId){
  const el = $(containerId);
  el.innerHTML = MATS[key].map(m=>`
    <div class="swatch ${state[key]===m.id && !(key==='kumas'&&state.customKumas) ? 'on':''}" data-id="${m.id}" style="background:${m.color}">
      <div class="lbl">${m.name}</div>
    </div>`).join("");
  el.querySelectorAll(".swatch").forEach(s=>s.onclick=()=>{
    state[key]=s.dataset.id;
    if(key==='kumas') state.customKumas=null;
    updateAll();
  });
  $(curId).textContent = (key==='kumas' && state.customKumas) ? "Özel" : (MATS[key].find(m=>m.id===state[key])?.name || "");
}

$("#ccInput").addEventListener("input", e=>{
  state.customKumas = e.target.value;
  $("#ccHex").textContent = e.target.value.toUpperCase() + " · MID (runtime)";
  $("#cur-kumas").textContent = "Özel";
  updateAll();
});

/* ---------------- Aydınlatma sekmesi ---------------- */
function renderLights(){
  $("#lightGrid").innerHTML = LIGHTS.map(l=>`
    <div class="light-card ${state.light===l.id?'on':''}" data-id="${l.id}">
      <div class="light-swatch" style="background:linear-gradient(135deg, ${l.bg[0]}, ${l.bg[1]})"></div>
      <b>${l.name}</b><span>${l.desc}</span>
    </div>`).join("");
  document.querySelectorAll(".light-card").forEach(c=>c.onclick=()=>{ state.light=c.dataset.id; updateAll(); });
}
$("#intensity").addEventListener("input", e=>{ state.intensity=+e.target.value; $("#intensVal").textContent=state.intensity+"%"; applyLighting(); });
$("#reflection").addEventListener("input", e=>{ state.reflection=+e.target.value; $("#reflVal").textContent=state.reflection+"%"; applyLighting(); });

/* ---------------- Varyant sekmesi ---------------- */
function renderVariants(){
  $("#sizeRow").innerHTML = SIZES.map(s=>`
    <div class="size-btn ${state.size===s.id?'on':''}" data-id="${s.id}"><b>${s.name}</b><span>${s.desc}</span></div>`).join("");
  document.querySelectorAll("#sizeRow .size-btn").forEach(b=>b.onclick=()=>{ state.size=b.dataset.id; updateAll(); });

  $("#armsRow").innerHTML = `
    <div class="size-btn ${state.arms?'on':''}" data-v="1"><b>Var</b><span>+destek</span></div>
    <div class="size-btn ${!state.arms?'on':''}" data-v="0"><b>Yok</b><span>−₺400</span></div>`;
  document.querySelectorAll("#armsRow .size-btn").forEach(b=>b.onclick=()=>{ state.arms = b.dataset.v==="1"; updateAll(); });
  $("#cur-arms").textContent = state.arms ? "Var" : "Yok";
}

/* ---------------- Sekme geçişi ---------------- */
document.querySelectorAll(".seg button").forEach(btn=>btn.onclick=()=>{
  document.querySelectorAll(".seg button").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  ["material","light","variant"].forEach(t=>{ $("#tab-"+t).style.display = (t===btn.dataset.tab)?"block":"none"; });
});

/* ============================================================
   3D VIEWPORT — saf CSS 3D ile kutulardan kurulmuş sandalye.
   Her parça 6 yüzlü bir "box3d"; sürükleyerek döndürülebilir.
   ============================================================ */
function makeBox(w,h,d,color,brightness){
  const box=document.createElement("div");
  box.className="box3d";
  box.style.width=w+"px"; box.style.height=h+"px";
  const faces=[
    {t:`rotateY(0deg) translateZ(${d/2}px)`,   w, h, b:1.00},
    {t:`rotateY(180deg) translateZ(${d/2}px)`, w, h, b:0.62},
    {t:`rotateY(90deg) translateZ(${w/2}px)`,  d, h, b:0.80},
    {t:`rotateY(-90deg) translateZ(${w/2}px)`, d, h, b:0.68},
    {t:`rotateX(90deg) translateZ(${h/2}px)`,  w, d, b:1.18},
    {t:`rotateX(-90deg) translateZ(${h/2}px)`, w, d, b:0.48},
  ];
  faces.forEach(f=>{
    const face=document.createElement("div");
    face.className="face";
    face.style.width=f.w+"px"; face.style.height=f.h+"px";
    face.style.left=((w-f.w)/2)+"px"; face.style.top=((h-f.h)/2)+"px";
    face.style.transform=f.t;
    face.dataset.baseB=f.b;
    face.style.background=color;
    face.style.filter=`brightness(${f.b*brightness})`;
    box.appendChild(face);
  });
  return box;
}
function place(el,x,y,z){ el.style.transform=`translate3d(${x}px,${y}px,${z}px)`; return el; }

let parts = {};
function buildChair(){
  const rig=$("#rig"); rig.innerHTML=""; parts={};
  const govdeColor = ()=> MATS.govde.find(m=>m.id===state.govde).color;
  const ayakColor  = ()=> MATS.ayak.find(m=>m.id===state.ayak).color;
  const kumasColor = ()=> state.customKumas || MATS.kumas.find(m=>m.id===state.kumas).color;
  const L = LIGHTS.find(l=>l.id===state.light);
  const b = (L.key)*(state.intensity/100);

  // Kumaş (oturma + sırt minderi)
  parts.seat = place(makeBox(150,22,150,kumasColor(),b), -75,60,-75); rig.appendChild(parts.seat);
  parts.back = place(makeBox(150,150,22,kumasColor(),b), -75,-90,-64); rig.appendChild(parts.back);
  // Gövde çerçeve (ahşap/metal iskelet çıtaları — kolçak)
  parts.armL = place(makeBox(16,60,150,govdeColor(),b), -83,10,-75); rig.appendChild(parts.armL);
  parts.armR = place(makeBox(16,60,150,govdeColor(),b),  67,10,-75); rig.appendChild(parts.armR);
  parts.armL.style.display = state.arms ? "block":"none";
  parts.armR.style.display = state.arms ? "block":"none";
  // Ayaklar
  const legY=82, legH=90, legW=14;
  parts.leg1 = place(makeBox(legW,legH,legW,ayakColor(),b), -68, legY, -60); rig.appendChild(parts.leg1);
  parts.leg2 = place(makeBox(legW,legH,legW,ayakColor(),b),  54, legY, -60); rig.appendChild(parts.leg2);
  parts.leg3 = place(makeBox(legW,legH,legW,ayakColor(),b), -68, legY,  46); rig.appendChild(parts.leg3);
  parts.leg4 = place(makeBox(legW,legH,legW,ayakColor(),b),  54, legY,  46); rig.appendChild(parts.leg4);

  const scale = SIZES.find(s=>s.id===state.size).scale;
  rig.style.transform += ` scale(${scale})`;
}

/* ---- orbit sürükleme ---- */
let rotX=-18, rotY=28, zoom=1, dragging=false, lastX=0, lastY=0, autoRotate=true;
function applyRig(){
  const scale = SIZES.find(s=>s.id===state.size).scale * zoom;
  $("#rig").style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) scale(${scale})`;
}
const persp = $("#perspective");
persp.addEventListener("mousedown", e=>{ dragging=true; autoRotate=false; lastX=e.clientX; lastY=e.clientY; persp.classList.add("dragging"); });
window.addEventListener("mouseup", ()=>{ dragging=false; persp.classList.remove("dragging"); });
window.addEventListener("mousemove", e=>{
  if(!dragging) return;
  rotY += (e.clientX-lastX)*0.35;
  rotX = Math.max(-70, Math.min(10, rotX - (e.clientY-lastY)*0.35));
  lastX=e.clientX; lastY=e.clientY; applyRig();
});
$("#resetView").onclick=()=>{ rotX=-18; rotY=28; zoom=1; applyRig(); };
$("#zoomIn").onclick=()=>{ zoom=Math.min(1.6, zoom+0.12); applyRig(); };
$("#zoomOut").onclick=()=>{ zoom=Math.max(0.6, zoom-0.12); applyRig(); };
$("#gridToggle").onclick=(e)=>{ e.currentTarget.classList.toggle("on"); $("#stage-bg").classList.toggle("with-grid"); };

const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
if(!reduceMotion){
  setInterval(()=>{ if(autoRotate){ rotY += 0.15; applyRig(); } }, 30);
}

/* ---- aydınlatma / zemin ---- */
function applyLighting(){
  const L = LIGHTS.find(l=>l.id===state.light);
  const stage = $("#stageWrap");
  stage.style.setProperty("--stage", L.bg[1]);
  $("#stage-bg").style.background =
    `radial-gradient(120% 90% at 50% -10%, ${L.bg[0]}, ${L.bg[1]} 78%)`;
  document.querySelector(".contact-shadow")?.remove();
  const shadow=document.createElement("div"); shadow.className="contact-shadow";
  shadow.style.background = `radial-gradient(closest-side, ${L.shadow}, transparent 72%)`;
  $("#perspective").appendChild(shadow);
  $("#rig").style.filter = `contrast(${L.contrast}) saturate(${1+ (L.contrast-1)*0.4})`;
  $("#hudLight").textContent = "Aydınlatma: " + L.name;
  rebuildFacesBrightness();
}
function rebuildFacesBrightness(){
  const L = LIGHTS.find(l=>l.id===state.light);
  const b = L.key*(state.intensity/100);
  document.querySelectorAll(".face").forEach(f=>{ f.style.filter = `brightness(${(+f.dataset.baseB)*b})`; });
}

/* ---- her şeyi tazele ---- */
function updateAll(){
  renderSwatches("govde","#sw-govde","#cur-govde");
  renderSwatches("ayak","#sw-ayak","#cur-ayak");
  renderSwatches("kumas","#sw-kumas","#cur-kumas");
  renderLights();
  renderVariants();
  buildChair();
  applyLighting();
  applyRig();
  renderPrice();
  const g=MATS.govde.find(m=>m.id===state.govde).name, a=MATS.ayak.find(m=>m.id===state.ayak).name;
  const k= state.customKumas ? "Özel Renk" : MATS.kumas.find(m=>m.id===state.kumas).name;
  $("#variantLine").textContent = `${g} · ${a} Ayak · ${k} Kumaş`;
}

renderCatalog();
updateAll();
</script>
